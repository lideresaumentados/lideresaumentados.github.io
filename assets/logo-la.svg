<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Input → Hidden connections -->
  <line x1="8" y1="14" x2="20" y2="10" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <line x1="8" y1="14" x2="20" y2="20" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <line x1="8" y1="14" x2="20" y2="30" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <line x1="8" y1="26" x2="20" y2="10" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <line x1="8" y1="26" x2="20" y2="20" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <line x1="8" y1="26" x2="20" y2="30" stroke="white" stroke-width="0.9" opacity="0.38"/>
  <!-- Hidden → Output connections -->
  <line x1="20" y1="10" x2="32" y2="20" stroke="#60b3f0" stroke-width="1.1" opacity="0.65"/>
  <line x1="20" y1="20" x2="32" y2="20" stroke="#60b3f0" stroke-width="1.4" opacity="0.9"/>
  <line x1="20" y1="30" x2="32" y2="20" stroke="#60b3f0" stroke-width="1.1" opacity="0.65"/>
  <!-- Input nodes -->
  <circle cx="8" cy="14" r="2.4" fill="white" opacity="0.88"/>
  <circle cx="8" cy="26" r="2.4" fill="white" opacity="0.88"/>
  <!-- Hidden nodes -->
  <circle cx="20" cy="10" r="2" fill="white" opacity="0.7"/>
  <circle cx="20" cy="20" r="2.5" fill="white"/>
  <circle cx="20" cy="30" r="2" fill="white" opacity="0.7"/>
  <!-- Output node (sky blue accent) -->
  <circle cx="32" cy="20" r="3" fill="#60b3f0"/>
  <circle cx="32" cy="20" r="1.5" fill="white" opacity="0.9"/>
</svg>

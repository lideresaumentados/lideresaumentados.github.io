<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Líderes Aumentados — Plataforma del programa</title>
<meta name="description" content="Plataforma del programa Líderes Aumentados: liderazgo estratégico e Inteligencia Artificial aplicada a la gestión pública en Santa Cruz.">
<link rel="stylesheet" href="css/styles.css?v=5">
</head>
<body>

<!-- ============================ PANTALLA DE ACCESO ============================ -->
<div id="gate-screen">
  <div class="gate-card">
    <div class="gate-brand">
      <div class="gate-brand-mark"></div>
      <span>Líderes Aumentados</span>
    </div>
    <h1>Bienvenido/a</h1>
    <p class="gate-sub">Ingresá con el correo y la clave que te compartieron los organizadores para acceder al contenido del programa.</p>
    <form id="gate-form">
      <label for="gate-email" class="visually-hidden">Correo</label>
      <input type="email" id="gate-email" placeholder="Tu correo" autocomplete="username" required>
      <label for="gate-clave" class="visually-hidden">Clave</label>
      <input type="password" id="gate-clave" placeholder="Tu clave" autocomplete="current-password" required>
      <div id="gate-error" role="alert"></div>
      <button type="submit" class="btn-primary" id="gate-submit">Ingresar</button>
    </form>
  </div>
</div>

<!-- ============================ APP (contenido protegido) ============================ -->
<div id="app">

  <div id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>Líderes Aumentados</span>
    </div>

    <nav id="main-nav" aria-label="Navegación principal">
      <button class="nav-item" data-view="inicio"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</button>
      <button class="nav-item" data-view="cronograma"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Cronograma</button>
      <button class="nav-item" data-view="modulos"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Módulos</button>
      <button class="nav-item" data-view="novedades"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Novedades</button>
    </nav>
  </aside>

  <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
    <div class="topbar-mobile">
      <button id="menu-toggle" aria-label="Abrir menú">☰</button>
      <span>Líderes Aumentados</span>
      <span style="width:24px;"></span>
    </div>

    <main class="main" id="main-content"><!-- se completa por JS --></main>
  </div>
</div>

<script src="js/content.js"></script>
<script src="js/app.js"></script>
</body>
</html>
